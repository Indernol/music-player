name: Release

# Build the Linux and Windows bundles and attach them to a GitHub Release.
# Trigger by pushing a tag like `v0.9.2`, or run manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04 # Linux: .deb, .rpm, .AppImage
          - platform: windows-latest # Windows: NSIS .exe + .msi
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libssl-dev

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install the Tauri CLI (JS dev dependency)
        run: npm install

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build the app and publish the release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Music Player ${{ github.ref_name }}"
          releaseBody: |
            Automated build.

            **Linux:** download the `.AppImage` (works on any distro — `chmod +x` then run),
            or the `.deb` / `.rpm` for your package manager. Or run the one-line installer:
            `curl -fsSL https://raw.githubusercontent.com/Indernol/music-player/main/install.sh | bash`

            **Windows:** run the `*-setup.exe` installer (or `winget install Indernol.MusicPlayer` once published).

            yt-dlp and ffmpeg are fetched automatically on first use (Linux); on Windows put them on PATH.
          releaseDraft: false
          prerelease: false
