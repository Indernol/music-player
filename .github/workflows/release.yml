name: Release

# Build the Linux and Windows bundles and attach them to a GitHub Release.
# Trigger by pushing a tag like `v0.14.5`, or run manually.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

jobs:
  build:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: ubuntu-22.04 # Linux: .deb, .rpm, .AppImage
          - platform: windows-latest # Windows: NSIS .exe
    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build dependencies
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            libwebkit2gtk-4.1-dev \
            libgtk-3-dev \
            librsvg2-dev \
            patchelf \
            libasound2-dev \
            libssl-dev

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install the Tauri CLI (JS dev dependency)
        run: npm install

      - name: Set up Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Cache Rust build
        uses: swatinem/rust-cache@v2
        with:
          workspaces: src-tauri

      - name: Build the app and publish the release
        uses: tauri-apps/tauri-action@v0.5
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "Music Player ${{ github.ref_name }}"
          releaseBody: |
            ## Install

            ### Linux
            One-line installer (picks the right package for your distro):
            ```sh
            curl -fsSL https://raw.githubusercontent.com/Indernol/music-player/main/install.sh | bash
            ```
            Or download manually: `.AppImage` (any distro), `.deb` (Debian/Ubuntu), `.rpm` (Fedora/RHEL).

            ### Windows
            One-line installer (PowerShell):
            ```powershell
            irm https://raw.githubusercontent.com/Indernol/music-player/main/install.ps1 | iex
            ```
            Or download and run the `*-setup.exe` installer below.

            > `yt-dlp` and `ffmpeg` are fetched automatically on first use (Linux).
            > On Windows, install them and add to PATH.
          releaseDraft: false
          prerelease: false
