# Android APK build (Tauri 2 mobile). Runs on demand (Actions → android → Run
# workflow) and on every v* tag. Produces a debug-signed APK (installable
# directly — enable "install from unknown sources") for arm64 phones, uploaded
# as a workflow artifact and attached to the release when triggered by a tag.
name: android

on:
  workflow_dispatch:
  push:
    tags: ["v*"]

env:
  NDK_VERSION: 26.1.10909125

jobs:
  apk:
    runs-on: ubuntu-latest
    permissions:
      contents: write # attach the APK to the release on tag builds
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
      - run: npm install

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: android-actions/setup-android@v3

      - name: Install NDK + platform
        run: sdkmanager "ndk;${NDK_VERSION}" "platforms;android-34" "build-tools;34.0.0"

      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: aarch64-linux-android

      - name: Init Android project
        run: |
          export NDK_HOME="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
          npx tauri android init --ci

      - name: Add audio/storage permissions to the manifest
        run: |
          M=src-tauri/gen/android/app/src/main/AndroidManifest.xml
          # Library scanning needs media-audio read access (scoped storage).
          sed -i 's#<uses-permission android:name="android.permission.INTERNET" */>#<uses-permission android:name="android.permission.INTERNET" />\n    <uses-permission android:name="android.permission.READ_MEDIA_AUDIO" />\n    <uses-permission android:name="android.permission.READ_EXTERNAL_STORAGE" android:maxSdkVersion="32" />#' "$M"
          grep -n "uses-permission" "$M"

      - name: Request media permission at startup (MainActivity)
        run: |
          # Declaring READ_MEDIA_AUDIO is not enough — it must be REQUESTED at
          # runtime or the library scan silently sees nothing. The generated
          # MainActivity is a bare TauriActivity; replace it with one that asks.
          A=$(find src-tauri/gen/android -name MainActivity.kt | head -1)
          PKG=$(grep -m1 '^package ' "$A")
          cat > "$A" <<KT
          $PKG

          import android.os.Build
          import android.os.Bundle
          import android.content.pm.PackageManager
          import android.graphics.Color
          import androidx.core.view.WindowCompat

          class MainActivity : TauriActivity() {
            override fun onCreate(savedInstanceState: Bundle?) {
              super.onCreate(savedInstanceState)
              // Edge-to-edge: draw the web content behind the status / nav bars so
              // the app is truly fullscreen; the CSS uses safe-area insets to keep
              // controls clear of them. Transparent bars over the dark UI.
              WindowCompat.setDecorFitsSystemWindows(window, false)
              window.statusBarColor = Color.TRANSPARENT
              window.navigationBarColor = Color.TRANSPARENT

              val wanted = if (Build.VERSION.SDK_INT >= 33)
                arrayOf(android.Manifest.permission.READ_MEDIA_AUDIO)
              else
                arrayOf(android.Manifest.permission.READ_EXTERNAL_STORAGE)
              val missing = wanted.filter { checkSelfPermission(it) != PackageManager.PERMISSION_GRANTED }
              if (missing.isNotEmpty()) requestPermissions(missing.toTypedArray(), 1)
            }
          }
          KT
          cat "$A"

      - name: Build APK (arm64, debug-signed)
        run: |
          export NDK_HOME="$ANDROID_SDK_ROOT/ndk/$NDK_VERSION"
          # rquickjs-sys regenerates its QuickJS bindings with bindgen on
          # Android — point clang at the NDK sysroot for the target headers.
          export BINDGEN_EXTRA_CLANG_ARGS_aarch64_linux_android="--sysroot=$NDK_HOME/toolchains/llvm/prebuilt/linux-x86_64/sysroot --target=aarch64-linux-android28"
          npx tauri android build --apk --debug --target aarch64

      - uses: actions/upload-artifact@v4
        with:
          name: MusicPlayer-android-arm64-apk
          path: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
          if-no-files-found: error

      - name: Attach APK to the release (tag builds)
        if: startsWith(github.ref, 'refs/tags/')
        uses: softprops/action-gh-release@v2
        with:
          files: src-tauri/gen/android/app/build/outputs/apk/**/*.apk
