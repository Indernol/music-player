<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Music Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">🎵 <span>Music Player</span></div>

      <button id="navLibrary" class="nav-item active"><span class="ni-ico">📚</span> Library</button>

      <div class="side-section">
        <div class="ss-head">
          <span class="ss-title">Sources</span>
          <button id="rescanBtn" class="icon-btn" title="Check all folders for new songs">⟳</button>
        </div>
        <button id="pickBtn" class="btn btn-block">📂 Add folder…</button>
        <button id="manualBtn" class="btn-line">⌨ Enter a path manually</button>
        <div class="src-list" id="sourcesList"></div>
      </div>

      <div class="side-section grow">
        <div class="ss-head"><span class="ss-title">Playlists</span></div>
        <div class="playlists-list" id="playlistsList"></div>
      </div>

      <button id="settingsBtn" class="settings-btn">⚙ Settings</button>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="search-wrap">
          <span class="search-ico">🔍</span>
          <input id="search" type="search" placeholder="Search title, artist, album…" autocomplete="off">
        </div>
        <span id="count" class="count"></span>
      </header>

      <div id="viewHead" class="view-head"></div>

      <div class="list-head" id="listHead">
        <span class="lh-idx">#</span><span></span><span>TITLE</span>
        <span class="lh-album">ALBUM</span><span class="lh-dur">🕓</span><span></span>
      </div>

      <section id="trackList" class="tracklist">
        <div class="empty"><div class="empty-ico">🎵</div>Add a folder as a source to start.</div>
      </section>
    </main>
  </div>

  <footer class="player">
    <div class="player-main">
      <div class="now">
        <div class="np-art" id="npArt">♪</div>
        <div class="np-txt">
          <div class="now-title" id="nowTitle">Nothing playing</div>
          <div class="now-sub" id="nowSub"></div>
        </div>
      </div>
      <div class="controls">
        <button id="shuffleBtn" class="ctrl" title="Shuffle">🔀</button>
        <button id="prevBtn" class="ctrl" title="Previous">⏮</button>
        <button id="playBtn" class="ctrl play" title="Play/Pause">▶</button>
        <button id="nextBtn" class="ctrl" title="Next">⏭</button>
      </div>
      <div class="volume">
        <label class="norm" title="Normalize loudness across tracks (ReplayGain tags)">
          <input type="checkbox" id="normChk" checked> NORM
        </label>
        <span>🔊</span>
        <input id="volume" type="range" min="0" max="100" value="80">
      </div>
    </div>
    <div class="progress">
      <span id="curTime" class="time">0:00</span>
      <input id="seek" class="seekbar" type="range" min="0" max="1" value="0" step="1">
      <span id="totTime" class="time">0:00</span>
    </div>
  </footer>

  <div id="ctxMenu" class="ctx-menu" hidden></div>

  <div id="settingsModal" class="modal-backdrop" hidden>
    <div class="modal">
      <div class="modal-head">
        <h2>Settings</h2>
        <button id="settingsClose" class="icon-btn" title="Close">✕</button>
      </div>
      <div id="settingsBody" class="modal-body"></div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
