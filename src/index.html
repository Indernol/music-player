<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Music Player</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="app">
    <aside class="sidebar">
      <div class="brand">🎵 <span>Music Player</span></div>

      <nav class="nav">
        <button class="nav-item active" data-view="library"><span class="ni-ico">📚</span> Library</button>
        <button class="nav-item" data-view="playlists"><span class="ni-ico">🎧</span> Playlists</button>
      </nav>

      <div class="folder-add">
        <div class="fa-head">
          <label>Music folders</label>
          <button id="rescanBtn" class="icon-btn" title="Rescan folders">⟳</button>
        </div>
        <button id="pickBtn" class="btn btn-block">📂 Add folder…</button>
        <details class="manual">
          <summary>or enter a path manually</summary>
          <div class="row">
            <input id="folderInput" type="text" placeholder="/path/to/music" spellcheck="false">
            <button id="scanBtn" class="btn">Scan</button>
          </div>
        </details>
      </div>

      <div class="section-label">Your playlists</div>
      <div class="playlists-list" id="playlistsList"></div>

      <button id="settingsBtn" class="settings-btn">⚙ Settings</button>
    </aside>

    <main class="main">
      <header class="topbar">
        <div class="search-wrap">
          <span class="search-ico">🔍</span>
          <input id="search" type="search" placeholder="Search title, artist, album…" autocomplete="off">
        </div>
        <span id="count" class="count"></span>
      </header>

      <section id="trackList" class="tracklist">
        <div class="empty"><div class="empty-ico">🎵</div>Add a music folder to start — your local files, played by a native engine.</div>
      </section>
    </main>
  </div>

  <footer class="player">
    <div class="player-main">
      <div class="now">
        <div class="np-art" id="npArt">♪</div>
        <div class="np-txt">
          <div class="now-title" id="nowTitle">Nothing playing</div>
          <div class="now-sub" id="nowSub"></div>
        </div>
      </div>
      <div class="controls">
        <button id="shuffleBtn" class="ctrl" title="Shuffle">🔀</button>
        <button id="prevBtn" class="ctrl" title="Previous">⏮</button>
        <button id="playBtn" class="ctrl play" title="Play/Pause">▶</button>
        <button id="nextBtn" class="ctrl" title="Next">⏭</button>
      </div>
      <div class="volume">
        <label class="norm" title="Normalize loudness across tracks (ReplayGain tags)">
          <input type="checkbox" id="normChk" checked> NORM
        </label>
        <span>🔊</span>
        <input id="volume" type="range" min="0" max="100" value="80">
      </div>
    </div>
    <div class="progress">
      <span id="curTime" class="time">0:00</span>
      <input id="seek" class="seekbar" type="range" min="0" max="1" value="0" step="1">
      <span id="totTime" class="time">0:00</span>
    </div>
  </footer>

  <!-- Right-click context menu (Spotify-style) -->
  <div id="ctxMenu" class="ctx-menu" hidden></div>

  <!-- Settings modal -->
  <div id="settingsModal" class="modal-backdrop" hidden>
    <div class="modal">
      <div class="modal-head">
        <h2>Settings</h2>
        <button id="settingsClose" class="icon-btn" title="Close">✕</button>
      </div>
      <div id="settingsBody" class="modal-body"></div>
    </div>
  </div>

  <script type="module" src="main.js"></script>
</body>
</html>
